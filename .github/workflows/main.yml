name: Native DevSecOps Pipeline
on:  
  push:    
    branches:      
      - main
permissions:  
  contents: read  
  security-events: write # Required to upload findings to GitHub Security Tab

jobs:  
  devsecops-scan:    
    runs-on: ubuntu-latest    
    steps:      
      - name: Checkout Code        
        uses: actions/checkout@v4        
        with:          
          fetch-depth: 0 # TruffleHog needs full history to scan commits

      # 1. SECRET SCANNING (TruffleHog OSS) - Fixed Base Commit Error
      - name: Scan for Hardcoded Secrets        
        uses: trufflesecurity/trufflehog@main        
        with:          
          base: ""          
          head: HEAD          
          extra_args: --only-verified 

      # 2. PYTHON ENVIRONMENT SETUP - Configured cleanly for root structure     
      - name: Install uv        
        uses: astral-sh/setup-uv@v5        
        with:          
          enable-cache: true      
      - name: Set up Python        
        uses: actions/setup-python@v5        
        with:          
          python-version: "3.11"      
      - name: Install Dependencies        
        run: |
          # If pyproject.toml doesn't exist yet, this ensures uv handles it gracefully
          if [ ! -f pyproject.toml ]; then uv init --app; fi
          uv sync      

      # 3. LINTING & QUALITY (Ruff & Mypy)      
      - name: Code Quality Checks        
        run: |          
          uv run ruff check . || echo "Ruff found style issues"
          uv run mypy . || echo "Mypy found type mismatches"    

      # 4. PYTHON SCA (Dependency Vulnerabilities)      
      - name: Scan Python Dependencies (pip-audit)        
        run: |          
          uv pip install pip-audit          
          uv run pip-audit --local      

      # 5. SAST (GitHub CodeQL) - Optimized for your Python root app     
      - name: Initialize CodeQL Engine        
        uses: github/codeql-action/init@v4        
        with:          
          languages: 'python'      
      - name: Perform CodeQL Analysis        
        uses: github/codeql-action/analyze@v4      

      # 6. CONTAINER SCANNING (Trivy Local Stack) - Fixed Version Tag & Path Bug
      - name: Build Docker Image Locally        
        run: |          
          docker build -t local/hybridllm-agentic-workflow:test -f Dockerfile .      
      - name: Scan Docker Image for Vulnerabilities        
        uses: aquasecurity/trivy-action@v0.36.0        
        with:          
          scan-type: 'image'          
          image-ref: 'local/hybridllm-agentic-workflow:test'          
          format: 'sarif'          
          output: 'trivy-results.sarif'          
          severity: 'CRITICAL,HIGH'      

      # 7. UPLOAD TRIVY RESULTS TO GITHUB SECURITY TAB      
      - name: Upload Trivy results to GitHub Security        
        uses: github/codeql-action/upload-sarif@v4        
        if: always()        
        with:          
          sarif_file: 'trivy-results.sarif'
